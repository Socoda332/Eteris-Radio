<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Eteris Radio</title>
    <link rel="icon" href="Eteris_Radio.jpg" type="image/jpeg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="site-header">
        <nav class="navbar container">
            <a class="logo" href="index.html#home">Eteris Radio</a>
            <ul class="nav-links">
                <li><a href="index.html#home">Inicio</a></li>
                <li><a href="about.html">Nosotros</a></li>
                <li><a href="schedule.html">Programación</a></li>
                <li><a href="contact.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="page-hero section-contact">
            <div class="section-content container">
                <span class="eyebrow">Contacto</span>
                <h1>Escríbenos y hablemos</h1>
                <p>Si tienes dudas, sugerencias o quieres trabajar con nosotros, completa el formulario y te responderemos pronto.</p>
            </div>
        </section>

        <section class="section-contact">
            <div class="section-content container">
                <form class="contact-form" action="https://formsubmit.co/samuelgil3451@gmail.com" method="POST">
                    <input type="hidden" name="_subject" value="Nuevo mensaje desde Eteris Radio">
                    <input type="hidden" name="_captcha" value="false">
                    <input type="hidden" name="_next" value="https://socoda332.github.io/Eteris-Radio/contact.html">
                    <input type="text" name="nombre" placeholder="Tu nombre" required>
                    <input type="email" name="email" placeholder="Tu correo electrónico" required>
                    <textarea name="mensaje" placeholder="Tu mensaje" rows="6" required></textarea>
                    <button type="submit" class="btn">Enviar mensaje</button>
                </form>
                <div class="section-action">
                    <a href="index.html#contact" class="btn">Volver a la landing</a>
                </div>
            </div>
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2026 Eteris Radio. Todos los derechos reservados.</p>
        </div>
    </footer>
    <script src="script.js"></script>
</body>
</html>
